<div *ngIf="user">
  <form>
    <div class="mb-3">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" class="form-control" id="firstName" [(ngModel)]="user.firstName" (ngModelChange)="onUserChange()" name="firstName">
    </div>
    <div class="mb-3">
      <label for="lastName" class="form-label">Last Name</label>
      <input type="text" class="form-control" id="lastName" [(ngModel)]="user.lastName" (ngModelChange)="onUserChange()" name="lastName">
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" [(ngModel)]="user.email" (ngModelChange)="onUserChange()" name="email">
    </div>
    <div class="mb-3">
      <label for="role" class="form-label">Role</label>
      <input type="text" class="form-control" id="role" [(ngModel)]="user.role" (ngModelChange)="onUserChange()" name="role">
    </div>
  </form>
</div>
