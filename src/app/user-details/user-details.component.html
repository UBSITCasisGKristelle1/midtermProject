<div class="container mt-4" *ngIf="user">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h4 class="mb-0">{{ user.firstName }} {{ user.lastName }}</h4>
          <button class="btn btn-sm btn-light" (click)="toggleEdit()">
            {{ isEditing ? 'Cancel' : 'Edit' }}
          </button>
        </div>
        <div class="card-body">
          <!-- View Mode -->
          <div *ngIf="!isEditing">
            <div class="row mb-4">
              <div class="col-md-6">
                <h6 class="text-muted">First Name</h6>
                <p class="fs-5">{{ user.firstName }}</p>
              </div>
              <div class="col-md-6">
                <h6 class="text-muted">Last Name</h6>
                <p class="fs-5">{{ user.lastName }}</p>
              </div>
            </div>
            <div class="row mb-4">
              <div class="col-md-6">
                <h6 class="text-muted">Email</h6>
                <p class="fs-5">{{ user.email }}</p>
              </div>
              <div class="col-md-6">
                <h6 class="text-muted">Role</h6>
                <p class="fs-5">
                  <span class="badge" [ngClass]="{'bg-primary': user.role === 'Admin', 'bg-secondary': user.role === 'User', 'bg-success': user.role === 'Manager', 'bg-warning': user.role === 'Editor'}">
                    {{ user.role }}
                  </span>
                </p>
              </div>
            </div>
            <div class="row mb-4">
              <div class="col-md-6">
                <h6 class="text-muted">User ID</h6>
                <p class="fs-5">{{ user.id }}</p>
              </div>
            </div>
          </div>

          <!-- Edit Mode -->
          <div *ngIf="isEditing && editUser">
            <form>
              <div class="mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" [(ngModel)]="editUser.firstName" name="firstName">
              </div>
              <div class="mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" [(ngModel)]="editUser.lastName" name="lastName">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" [(ngModel)]="editUser.email" name="email">
              </div>
              <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-control" id="role" [(ngModel)]="editUser.role" name="role">
                  <option value="Admin">Admin</option>
                  <option value="Manager">Manager</option>
                  <option value="Editor">Editor</option>
                  <option value="User">User</option>
                </select>
              </div>
              <div class="mt-4">
                <button type="button" class="btn btn-success me-2" (click)="saveChanges()">Save Changes</button>
                <button type="button" class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="mt-3">
        <a href="/users" class="btn btn-outline-secondary">Back to Users</a>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!user" class="container mt-5">
  <div class="alert alert-warning">User not found.</div>
</div>
